name: Publish container image (GHCR)

# Builds the single-container Unraid/self-host image and publishes it to
# ghcr.io/0xc/brigata-studio2go on every change. The CA template pulls :latest.
on:
  push:
    branches: [unraid-docker, main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/0xc/brigata-studio2go:latest
            ghcr.io/0xc/brigata-studio2go:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
